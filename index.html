<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>BubuWrite - Text to Cute Animation</title>
    <style>
        /* Simple & Cute Design */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #fff0f5; 
            text-align: center; 
            margin: 0;
            padding: 20px;
        }
        .main-box {
            background: white;
            max-width: 450px;
            margin: 50px auto;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        h1 { color: #ff69b4; font-size: 28px; margin-bottom: 5px; }
        p { color: #888; margin-bottom: 25px; }
        
        input { 
            width: 80%; 
            padding: 12px; 
            border: 2px solid #ffc0cb; 
            border-radius: 15px; 
            outline: none;
            font-size: 16px;
        }
        
        button { 
            background-color: #ff69b4; 
            color: white; 
            border: none; 
            padding: 12px 30px; 
            border-radius: 15px; 
            margin-top: 15px; 
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background-color: #ff1493; transform: scale(1.05); }

        #displayArea { margin-top: 30px; }
        img { max-width: 100%; border-radius: 20px; display: none; }
    </style>
</head>
<body>

    <div class="main-box">
        <h1>BubuWrite 🐾</h1>
        <p>Apna message likho aur Bubu banaye!</p>

        <input type="text" id="textInput" placeholder="Type your message here...">
        <br>
        <button onclick="generateBubu()">Generate Animation</button>

        <div id="displayArea">
            <img id="bubuGif" src="" alt="Bubu Animation">
        </div>
    </div>

    <script>
        function generateBubu() {
            const val = document.getElementById('textInput').value;
            const img = document.getElementById('bubuGif');

            if (val === "") {
                alert("Please enter some text!");
                return;
            }

            // Simple Logic: Cloudinary overlays your text on a preset Bubu GIF
            const encodedText = encodeURIComponent(val);
            const cloudName = "demo"; 
            const baseGif = "https://media.tenor.com/79_uS47v_E0AAAAC/bubu-dudu-bubu.gif";
            
            // This URL creates the text overlay automatically
            const finalUrl = `https://res.cloudinary.com/${cloudName}/image/fetch/l_text:Verdana_40_bold:${encodedText},co_rgb:ff1493,g_south,y_20/${baseGif}`;

            img.src = finalUrl;
            img.style.display = "inline-block";
        }
    </script>

</body>
</html>
