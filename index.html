<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BubuWrite - Text to Cute Animation</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #fff0f5; text-align: center; padding: 20px; margin: 0; }
        .main-box { background: white; max-width: 400px; margin: 30px auto; padding: 25px; border-radius: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        h1 { color: #ff69b4; margin-bottom: 10px; }
        input { width: 85%; padding: 12px; border: 2px solid #ffc0cb; border-radius: 15px; outline: none; font-size: 16px; margin-bottom: 15px; }
        button { background-color: #ff69b4; color: white; border: none; padding: 12px 25px; border-radius: 15px; cursor: pointer; font-weight: bold; font-size: 16px; width: 90%; }
        button:active { transform: scale(0.98); }
        #displayArea { margin-top: 25px; min-height: 200px; }
        img { max-width: 100%; border-radius: 20px; display: none; border: 4px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .loading-text { color: #ff69b4; font-weight: bold; display: none; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="main-box">
        <h1>BubuWrite 🐾</h1>
        <p style="color: #888;">Type your message and wait 2 seconds!</p>
        
        <input type="text" id="textInput" placeholder="I love you Bholu...">
        <button onclick="generateBubu()">Generate Animation</button>
        
        <div id="displayArea">
            <div id="loader" class="loading-text">Making it cute... Please wait...</div>
            <img id="bubuGif" src="" alt="Bubu Animation">
        </div>
    </div>

    <script>
        function generateBubu() {
            const val = document.getElementById('textInput').value;
            const img = document.getElementById('bubuGif');
            const loader = document.getElementById('loader');

            if (val.trim() === "") {
                alert("Please enter a message!");
                return;
            }

            // Show loader, hide old image
            loader.style.display = "block";
            img.style.display = "none";

            // Encode text for URL
            const encodedText = encodeURIComponent(val);
            
            // This is the direct magic link
            const finalUrl = `https://res.cloudinary.com/demo/image/fetch/l_text:Arial_40_bold:${encodedText},co_rgb:ff1493,g_south,y_25/https://media.tenor.com/79_uS47v_E0AAAAC/bubu-dudu-bubu.gif`;

            // Set the source
            img.src = finalUrl;

            // When image is fully loaded by Cloudinary
            img.onload = function() {
                loader.style.display = "none";
                img.style.display = "inline-block";
            };

            // Error check
            img.onerror = function() {
                loader.style.display = "none";
                alert("Something went wrong. Check your internet!");
            };
        }
    </script>

</body>
</html>
